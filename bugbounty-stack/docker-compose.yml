services:
  bugbounty:
    build: .
    container_name: bugbounty-stack
    ports:
      - "37695:37695"
      - "8888:8888"
      - "25989:25989"
      - "1611:1611"
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen3.5:9b
      - VILLAGER_HOST=0.0.0.0
      - VILLAGER_PORT=37695
      - VILLAGER_BASE_URL=http://127.0.0.1:37695
      - HEXSTRIKE_BASE_URL=http://127.0.0.1:8888
      - MCP_CLIENT_BASE_URL=http://localhost:25989
      - ALLOW_SHELL=1
      - ALLOW_APT=1
      - ALLOW_WRITE=1
      - ALLOW_BUILD=1
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      # rootless socket path
      - ${DOCKER_SOCK}:/var/run/docker.sock
      - ./results:/opt/results
    restart: unless-stopped
    command: >
      bash -c "
        cd /opt/hexstrike-ai && .venv/bin/python3 hexstrike_server.py &
        cd /opt/villager-ai-hexstrike-integration &&
        bash scripts/start_villager_proper.sh &
        wait
      "
